services:
  wirebuddy:
    image: giiibates/wirebuddy:latest
    container_name: wirebuddy
    restart: unless-stopped
    network_mode: host
    #networks:
    #  - traefik-proxy 
    #ports: 
    #  - 51829:51820
    #  - 9000:8000
    cap_add:
      - NET_ADMIN       # Required for network configuration
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true

